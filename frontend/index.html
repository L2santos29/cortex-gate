<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Gate — Extensible AI Platform</title>
  <link rel="stylesheet" href="src/styles.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
  </style>
  <script type="module" src="src/main.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="app-shell" class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="sidebar flex flex-col bg-white border-r border-slate-200 w-60 shrink-0">
      <!-- Logo -->
      <div class="logo-area px-4 py-5 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white text-xs font-bold shadow-sm">CG</div>
          <div>
            <div class="text-sm font-semibold text-slate-800 leading-tight">Cortex Gate</div>
            <div class="text-[10px] text-slate-400 font-medium tracking-wide">EXTENSIBLE PLATFORM</div>
          </div>
        </div>
      </div>

      <!-- Navigation (built dynamically) -->
      <nav id="sidebar-nav" class="flex-1 px-3 py-4 space-y-1 overflow-y-auto"></nav>

      <!-- Status bar -->
      <div class="status-bar px-4 py-3 border-t border-slate-100">
        <div class="flex items-center gap-2 text-xs text-slate-400">
          <span id="gateway-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <span id="gateway-status">Gateway Online</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="app" class="flex-1 overflow-y-auto p-6 lg:p-8"></main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 pointer-events-none translate-y-4 opacity-0 transition-all duration-300 z-50">
    <span id="toast-icon" class="w-2 h-2 rounded-full bg-cyan-500"></span>
    <span id="toast-msg" class="text-sm"></span>
  </div>

  <!-- Modal -->
  <div id="modal-backdrop" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-200">
    <div id="modal-box" class="bg-white rounded-xl shadow-xl border border-slate-200 w-full max-w-md mx-4 scale-95 transition-all duration-200">
      <div id="modal-content"></div>
    </div>
  </div>
</body>
</html>
